name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v*.*.*'  # Only semantic version tags (e.g., v7.0.0)
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - latest

env:
  REGISTRY: docker.io
  IMAGE_NAME: cryptochrome/dovi_convert

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine Tags
        id: config
        run: |
          # Determine version and appropriate tags
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            # Tag push (e.g., v7.0.0) -> tag as version + latest
            VERSION=${GITHUB_REF#refs/tags/v}
            TAGS="${{ env.IMAGE_NAME }}:${VERSION},${{ env.IMAGE_NAME }}:latest"
            echo "Building from tag: v${VERSION}"
          else
            # Manual trigger
            BUILD_TYPE="${{ inputs.build_type }}"
            if [ "$BUILD_TYPE" == "latest" ]; then
              TAGS="${{ env.IMAGE_NAME }}:latest"
              echo "Rebuilding :latest from main branch (hotfix)"
            else
              TAGS="${{ env.IMAGE_NAME }}:dev"
              echo "Building :dev image for testing"
            fi
          fi

          echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT

      - name: Check upstream versions
        id: versions
        run: |
          # Fetch latest TTYD version
          TTYD_TAG=$(curl -s https://api.github.com/repos/tsl0922/ttyd/releases/latest | jq -r .tag_name)
          TTYD_VERSION=${TTYD_TAG#v}
          echo "TTYD_VERSION=${TTYD_VERSION}" >> $GITHUB_OUTPUT
          echo "Found ttyd version: ${TTYD_VERSION}"

          # Fetch latest dovi_tool version
          DOVI_TAG=$(curl -s https://api.github.com/repos/quietvoid/dovi_tool/releases/latest | jq -r .tag_name)
          DOVI_VERSION=${DOVI_TAG#v}
          echo "DOVI_TOOL_VERSION=${DOVI_VERSION}" >> $GITHUB_OUTPUT
          echo "Found dovi_tool version: ${DOVI_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.config.outputs.TAGS }}
          build-args: |
            TTYD_VERSION=${{ steps.versions.outputs.TTYD_VERSION }}
            DOVI_TOOL_VERSION=${{ steps.versions.outputs.DOVI_TOOL_VERSION }}
