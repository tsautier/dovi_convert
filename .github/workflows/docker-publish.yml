name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v6*'  # Triggers Stable build
      - 'v7*'  # Triggers Beta build
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (stable uses Bash script from latest release)'
        required: true
        default: 'beta'
        type: choice
        options:
        - beta
        - stable

env:
  REGISTRY: docker.io
  IMAGE_NAME: cryptochrome/dovi_convert

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version and Determine Config
        id: config
        run: |
          # Parse GITHUB_REF (refs/tags/v7.0.0 or refs/heads/main)
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            # Handle branch execution (e.g. main)
            VERSION=${GITHUB_REF#refs/heads/}
            VERSION=${VERSION//\//-} # Sanitize: replace / with -
          fi
          
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" == 6* ]] || [[ "${{ inputs.build_type }}" == "stable" ]]; then
            echo "Building STABLE (v6)"
            echo "DOCKERFILE=Dockerfile.stable" >> $GITHUB_OUTPUT
            # Tag as: latest, 6.x.x (or branch-name if manual)
            if [[ "$VERSION" == 6* ]]; then
               TAGS="${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${VERSION}"
            else
               TAGS="${{ env.IMAGE_NAME }}:${VERSION}"
            fi
            echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT
            
          elif [[ "$VERSION" == 7* ]] || [[ "${{ inputs.build_type }}" == "beta" ]]; then
            echo "Building BETA (v7)"
            echo "DOCKERFILE=Dockerfile.beta" >> $GITHUB_OUTPUT
            # Tag as: beta, 7.x.x (or branch-name if manual)
            if [[ "$VERSION" == 7* ]]; then
               TAGS="${{ env.IMAGE_NAME }}:beta,${{ env.IMAGE_NAME }}:${VERSION}"
            else
               TAGS="${{ env.IMAGE_NAME }}:${VERSION}"
            fi
            echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT
            
          else
            echo "::error::Unknown version/build type. You must select 'beta' or 'stable' manually for non-release builds."
            exit 1
          fi

      - name: Check upstream versions
        id: versions
        run: |
          # Fetch latest TTYD version
          TTYD_TAG=$(curl -s https://api.github.com/repos/tsl0922/ttyd/releases/latest | jq -r .tag_name)
          # Strip leading 'v' if present
          TTYD_VERSION=${TTYD_TAG#v}
          echo "TTYD_VERSION=${TTYD_VERSION}" >> $GITHUB_OUTPUT
          echo "Found ttyd version: ${TTYD_VERSION}"

          # Fetch latest dovi_tool version
          DOVI_TAG=$(curl -s https://api.github.com/repos/quietvoid/dovi_tool/releases/latest | jq -r .tag_name)
          DOVI_VERSION=${DOVI_TAG#v}
          echo "DOVI_TOOL_VERSION=${DOVI_VERSION}" >> $GITHUB_OUTPUT
          echo "Found dovi_tool version: ${DOVI_VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.config.outputs.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.config.outputs.TAGS }}
          build-args: |
            TTYD_VERSION=${{ steps.versions.outputs.TTYD_VERSION }}
            DOVI_TOOL_VERSION=${{ steps.versions.outputs.DOVI_TOOL_VERSION }}
