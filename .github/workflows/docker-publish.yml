name: Build and Push Docker Image

on:
  push:
    tags:
      - 'v6*'  # Triggers Stable build
      - 'v7*'  # Triggers Beta build
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: cryptochrome/dovi_convert

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version and Determine Config
        id: config
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=${VERSION}" >> $GITHUB_OUTPUT
          
          if [[ "$VERSION" == 6* ]]; then
            echo "Building STABLE (v6)"
            echo "DOCKERFILE=Dockerfile.stable" >> $GITHUB_OUTPUT
            # Tag as: latest, 6.x.x
            echo "TAGS=${{ env.IMAGE_NAME }}:latest,${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
            
          elif [[ "$VERSION" == 7* ]]; then
            echo "Building BETA (v7)"
            echo "DOCKERFILE=Dockerfile.beta" >> $GITHUB_OUTPUT
            # Tag as: beta, 7.x.x
            echo "TAGS=${{ env.IMAGE_NAME }}:beta,${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
            
          else
            echo "Unknown version branch. Building as custom tag only."
            echo "DOCKERFILE=Dockerfile.beta" >> $GITHUB_OUTPUT
            echo "TAGS=${{ env.IMAGE_NAME }}:${VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ steps.config.outputs.DOCKERFILE }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.config.outputs.TAGS }}
